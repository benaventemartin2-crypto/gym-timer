*{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
body{overscroll-behavior:none;user-select:none;background:var(--bg);color:var(--t0);}
.fade{animation:fadeIn .18s ease both;}
.s-up{animation:slideUp .3s cubic-bezier(.32,.72,0,1) both;}
.cd-pop{animation:cdPop .3s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes cdPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
.tab-active{color:var(--t0);border-bottom:2px solid var(--t0);}
.tab-inactive{color:var(--t3);border-bottom:2px solid transparent;}

// ─── STORAGE ───────────────────────────────────────────────────────────────────
const WK='gt_weights_v3', HK='gt_history_v3', SK='gt_sessions_v5', DK='gt_dark_v1', DAY_K='gt_days_v1'
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)) }catch{ return null } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} }
function getSessions(){ return lsGet(SK) || SESSIONS_SEED }
function saveSessionById(sess){ const all=getSessions().map(s=>s.id===sess.id?sess:s); lsSet(SK,all) }
function getWeight(n){ const d=lsGet(WK)||{}; return d[n]||null }
function logWeight(n,e){ const d=lsGet(WK)||{}; d[n]={...e,date:new Date().toISOString().slice(0,10)}; lsSet(WK,d) }
function weekKey(){ const d=new Date(),day=d.getDay()||7,m=new Date(d); m.setDate(d.getDate()-day+1); return m.toISOString().slice(0,10) }
function todayKey(){ return new Date().toISOString().slice(0,10) }
function completedThisWeek(){ return (lsGet(HK)||{})[weekKey()]||[] }
function markDone(id){
 const h=lsGet(HK)||{},w=weekKey(); if(!h[w])h[w]=[]; if(!h[w].includes(id))h[w].push(id); lsSet(HK,h)
 const dy=lsGet(DAY_K)||{},t=todayKey(); if(!dy[t])dy[t]=[]; if(!dy[t].includes(id))dy[t].push(id); lsSet(DAY_K,dy)
}
function getDayDone(dateKey){ return (lsGet(DAY_K)||{})[dateKey]||[] }
function getWeekDays(){ const days=[],today=new Date(),dow=today.getDay()||7,mon=new Date(today); mon.setDate(today.getDate()-dow+1); for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d.toISOString().slice(0,10))} return days }

let darkMode = (()=>{ const v=lsGet(DK); return v!==null?v:true })()
function applyTheme(){
 if(darkMode) document.documentElement.classList.remove('light')
 else document.documentElement.classList.add('light')
 document.getElementById('tc').content = darkMode?'#08080e':'#f2f2f7'
}
function toggleDark(){ darkMode=!darkMode; lsSet(DK,darkMode); applyTheme(); render() }
applyTheme()

// ─── BUILD QUEUE ───────────────────────────────────────────────────────────────
function buildQueue(session){
 const q=[]
 session.blocks.forEach((blk,bi)=>{
  q.push({ type:'section', name:blk.name, icon:blk.icon,
   instruction:`${blk.exercises.length} ejercicios · ~${blk.duration} min`, duration:3, bi })
  blk.exercises.forEach((ex,ei)=>{
   const base={...ex, bi, ei, blockName:blk.name}
   const totalSets=ex.sets||1
   for(let s=0;s<totalSets;s++){
    const si=totalSets>1?{setNum:s+1,totalSets}:{}
    if(ex.side){
     q.push({ type:'exercise',...base,...si, sideLabel:'IZQUIERDO' })
     q.push({ type:'rest', name:'Cambia de lado', instruction:'Prepárate para el otro lado', duration:10, bi })
     q.push({ type:'exercise',...base,...si, sideLabel:'DERECHO' })
    } else {
     q.push({ type:'exercise',...base,...si })
    }
    if(ex.rest) q.push({ type:'rest', name:s<totalSets-1?'Entre series':'Descanso',
     instruction:s<totalSets-1?`Serie ${s+1} completada. Recupera.`:'Respira. Siguiente ejercicio.', duration:ex.rest, bi })
   }
  })
 })
 return q
}

let state = {
 screen:'home', cat:'gym', sessionId:null,
 queue:[], qIndex:0, timeLeft:0, itemDuration:0,
 isRunning:false, wasRunning:false,
 phase:'preview', countdownVal:3,
 showWeight:false, pendingEx:null, pendingBi:null, pendingEi:null,
 wf:{ weight:'', unit:'kg', tool:'mancuernas', rpe:'medio' },
 showCoach:false,
 editSessionId:null, editData:null, editExpanded:null, editImagePicker:null, editError:null,
 // Lista libre de ejercicios
 listDone:{}, listPhase:'list', listActiveEx:null, listInlineTimer:null,
}
let timerInterval=null, wakeLock=null, listRestInterval=null

// ─── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer(){
 if(timerInterval) return
 timerInterval=setInterval(()=>{
  if(!state.isRunning) return
  const cur=state.queue[state.qIndex]

  // Countdown 3-2-1
  if(cur?.type==='exercise'&&state.phase==='countdown'){
   state.countdownVal--
   vibe([15])
   if(state.countdownVal<=0){
    state.phase='active'
    vibe([80])
   }
   render(); return
  }

  state.timeLeft--

  if(state.timeLeft<=0){
   const nxt=state.qIndex+1
   if(nxt>=state.queue.length){
    clearInterval(timerInterval); timerInterval=null
    state.isRunning=false; state.screen='done'
    markDone(state.sessionId)
    vibe([100,50,100,50,300])
   } else {
    const ni=state.queue[nxt]
    state.qIndex=nxt; state.timeLeft=ni.duration; state.itemDuration=ni.duration
    if(ni.type==='exercise'){
     state.phase='preview'; state.isRunning=false
    } else if(ni.type==='rest'){
     vibe([40,30,40])
    }
   }
  }
  render()
 },1000)
}
function stopTimer(){ clearInterval(timerInterval); timerInterval=null }

// ─── ACTIONS ───────────────────────────────────────────────────────────────────
function selectSession(id){ state.sessionId=id; state.screen='session'; render() }
function startWorkout(){
 const session=getSessions().find(s=>s.id===state.sessionId)
 if(!session||!session.blocks.length) return
 const q=buildQueue(session)
 const fi=q[0]
 state={...state, screen:'workout', queue:q, qIndex:0,
  timeLeft:fi.duration, itemDuration:fi.duration,
  isRunning:fi.type!=='exercise', phase:fi.type==='exercise'?'preview':'section',
  countdownVal:3, showWeight:false}
 if(!timerInterval) startTimer()
 navigator.wakeLock?.request('screen').then(l=>{wakeLock=l}).catch(()=>{})
 render()
}
function startExercise(){
 state.phase='countdown'; state.countdownVal=3; state.isRunning=true; render()
}
function toggleRun(){
 if(state.phase==='preview'){ startExercise(); return }
 state.isRunning=!state.isRunning; render()
}
function goNext(){
 const nxt=state.qIndex+1
 if(nxt>=state.queue.length){ stopTimer(); markDone(state.sessionId); state.screen='done'; state.isRunning=false; render(); return }
 const ni=state.queue[nxt]
 state.qIndex=nxt; state.timeLeft=ni.duration; state.itemDuration=ni.duration
 if(ni.type==='exercise'){ state.phase='preview'; state.isRunning=false }
 render()
}
function goPrev(){
 if(state.qIndex<=0) return
 const pi=state.qIndex-1
 const prev=state.queue[pi]
 state.qIndex=pi; state.timeLeft=prev.duration; state.itemDuration=prev.duration
 if(prev.type==='exercise'){ state.phase='active'; state.isRunning=false }
 else state.phase=prev.type==='rest'?'rest':'section'
 render()
}
function restart(){
 stopTimer()
 const q=state.queue, fi=q[0]
 state.qIndex=0; state.timeLeft=fi?.duration??0; state.itemDuration=fi?.duration??0
 state.phase=fi?.type==='exercise'?'preview':'section'
 state.isRunning=fi?.type!=='exercise'; state.screen='workout'
 startTimer(); render()
}
function goHome(){ stopTimer(); wakeLock?.release(); state.screen='home'; state.isRunning=false; render() }
function goSession(){ state.isRunning=false; state.screen='session'; render() }
function setCat(c){ state.cat=c; render() }
function openWeightModal(name,bi,ei){
 const ex=getWeight(name)
 state.pendingEx=name
 state.pendingBi=(bi===undefined||bi===null||bi==='')?null:+bi
 state.pendingEi=(ei===undefined||ei===null||ei==='')?null:+ei
 state.wf=ex?{weight:ex.weight,unit:ex.unit||'kg',tool:ex.tool||'mancuernas',rpe:ex.rpe||'medio'}:{weight:'',unit:'kg',tool:'mancuernas',rpe:'medio'}
 state.wasRunning=state.isRunning; state.isRunning=false
 state.showWeight=true; render()
}
function closeWeightModal(){
 const hadEdit=state.pendingBi!==null
 state.showWeight=false; state.pendingEx=null
 state.pendingBi=null; state.pendingEi=null
 if(hadEdit&&state.screen==='workout'&&state.queue?.length) rebuildQueueKeepingPosition()
 if(state.wasRunning) state.isRunning=true
 render()
}
function rebuildQueueKeepingPosition(){
 const sess=getSessions().find(s=>s.id===state.sessionId)
 if(!sess) return
 const cur=state.queue[state.qIndex]
 const newQ=buildQueue(sess)
 let idx=-1
 if(cur){
  idx=newQ.findIndex(it=>it.type===cur.type&&it.bi===cur.bi&&it.ei===cur.ei&&(it.setNum||0)===(cur.setNum||0)&&(it.sideLabel||'')===(cur.sideLabel||''))
  if(idx<0) idx=newQ.findIndex(it=>it.type==='exercise'&&it.bi===cur.bi&&it.ei===cur.ei)
  if(idx<0) idx=Math.min(state.qIndex,newQ.length-1)
 }
 state.queue=newQ
 if(idx>=0){
  state.qIndex=idx
  const ni=newQ[idx]
  if(ni&&state.timeLeft>ni.duration){ state.timeLeft=ni.duration; state.itemDuration=ni.duration }
 }
}
function captureWtInput(){ const el=document.getElementById('wt-n'); if(el) state.wf.weight=el.value }
function saveWeightEntry(){ captureWtInput(); if(state.pendingEx) logWeight(state.pendingEx,{...state.wf}); closeWeightModal() }

function openEdit(id){

 if(!sess) return

 state.editExpanded=null; state.editImagePicker=null; state.editError=null
 state.screen='edit'; render()
}
function goEditBack(){ state.screen='session'; state.editData=null; render() }
function saveEdit(){
 let valid=true
 state.editData.blocks.forEach(b=>b.exercises.forEach(e=>{
  const d=Number(e.duration)
  if(!e.name?.trim()||isNaN(d)||d<=0) valid=false
 }))
 if(!valid){ state.editError='Revisa que todos los ejercicios tengan nombre y duración válida.'; render(); return }
 saveSessionById(state.editData)
 state.screen='session'; state.editData=null; render()
}
function editExpandEx(key){ state.editExpanded=state.editExpanded===key?null:key; render() }
function moveExUp(bi,ei){
 const exs=state.editData.blocks[bi].exercises
 if(ei===0) return
 ;[exs[ei-1],exs[ei]]=[exs[ei],exs[ei-1]]; render()
}
function moveExDown(bi,ei){
 const exs=state.editData.blocks[bi].exercises
 if(ei>=exs.length-1) return
 ;[exs[ei],exs[ei+1]]=[exs[ei+1],exs[ei]]; render()
}
function deleteEx(bi,ei){
 if(!confirm(`¿Eliminar "${state.editData.blocks[bi].exercises[ei].name}"?`)) return

 render()
}
function duplicateEx(bi,ei){

 state.editData.blocks[bi].exercises.splice(ei+1,0,ex); render()

}
function updateExField(bi,ei,field,value){
 const ex=state.editData.blocks[bi].exercises[ei]
 if(field==='duration') ex.duration=Number(value)||0
 else if(field==='sets') ex.sets=Number(value)||1
 else if(field==='rest') ex.rest=value===''?undefined:Number(value)||0
 else ex[field]=value
}
function updateSessionExField(bi,ei,field,value){
 const sess=getSessions().find(s=>s.id===state.sessionId)
 if(!sess) return
 const ex=sess.blocks[bi].exercises[ei]
 if(field==='sets')      ex.sets=Math.max(1,Number(value)||1)
 else if(field==='reps') ex.reps=value
 else if(field==='rest') ex.rest=value===''?undefined:Math.max(0,Number(value)||0)
 saveSessionById(sess)
 if(state.listActiveEx&&state.listActiveEx.bi===bi&&state.listActiveEx.ei===ei){
  state.listActiveEx={bi,ei,ex:sess.blocks[bi].exercises[ei]}
 }
}
function openImagePicker(bi,ei){ state.editImagePicker={bi,ei}; render() }
function selectImage(name){

 state.editData.blocks[bi].exercises[ei].image=name

}

function getAllImages(){
 const names=new Set()
 SESSIONS_SEED.forEach(s=>s.blocks.forEach(b=>b.exercises.forEach(e=>{ if(e.image) names.add(e.image) })))
 return [...names].sort()
}

// ─── FORMAT ────────────────────────────────────────────────────────────────────
function fmt(s){ const m=Math.floor(s/60),sec=s%60; return m>0?`${m}:${String(sec).padStart(2,'0')}`:String(s) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ─── WORKOUT HELPERS ───────────────────────────────────────────────────────────
function exProgress(){
 const total=state.queue.filter(i=>i.type==='exercise').length
 const done=state.queue.slice(0,state.qIndex).filter(i=>i.type==='exercise').length
 const cur=state.queue[state.qIndex]
 const curNum=cur?.type==='exercise'?done+1:done
 const pct=total>0?(done/total)*100:0
 return {total,done,curNum,pct}
}
function blockBar(session,curBi,c){
 return session.blocks.map((_,bi)=>
  `<div class="h-0.5 flex-1 rounded-full ${bi<curBi?c.bar:bi===curBi?'bg-white/30':'bg-[#1c1c28]'}"></div>`
 ).join('')
}
function progressBar(pct,c){
 return `<div class="h-1 mx-4 rounded-full overflow-hidden mb-2 flex-shrink-0" style="background:var(--b2)">
  <div class="h-full rounded-full transition-all duration-500 ${c.bar}" style="width:${pct.toFixed(1)}%"></div>
 </div>`

// ─── RENDER WORKOUT (dispatcher) ───────────────────────────────────────────────
function renderWorkout(){
 const session=getSessions().find(s=>s.id===state.sessionId), c=ACCENT[session.accent]
 const cur=state.queue[state.qIndex]
 const {total,curNum,pct}=exProgress()
 if(state.phase==='countdown') return renderCountdown(cur,c,session)
 if(cur?.type==='section') return renderSection(cur,c,session,curNum,total,pct)
 if(cur?.type==='rest') return renderRest(cur,c,session,curNum,total,pct)
 if(state.phase==='preview') return renderPreview(cur,c,session,curNum,total,pct)
 return renderActive(cur,c,session,curNum,total,pct)
}

 const doneCount=Object.keys(state.listDone).filter(k=>state.listDone[k]).length

 return `

        </div>

// ─── LISTA LIBRE ───────────────────────────────────────────────────────────────
function isStretchEx(ex){
 return ['stretch','mobility','foam'].includes(getExMeta(ex).visualId)
}
function startWorkoutList(){
 if(listRestInterval){ clearInterval(listRestInterval); listRestInterval=null }
 state.screen='workout-list'
 state.listDone={}
 state.listPhase='list'
 state.listActiveEx=null
 state.listInlineTimer=null
 navigator.wakeLock?.request('screen').then(l=>{wakeLock=l}).catch(()=>{})
 render()
}
function listTap(bi,ei){
 const session=getSessions().find(s=>s.id===state.sessionId)
 const ex=session.blocks[bi].exercises[ei]
 state.listActiveEx={ex,bi,ei}
 state.listPhase='modal'
 render()
}
function listMarkDone(bi,ei){
 const session=getSessions().find(s=>s.id===state.sessionId)
 const ex=session.blocks[bi].exercises[ei]
 const key=`${ex.name}|${bi}|${ei}`
 const wasDone=state.listDone[key]
 state.listDone[key]=!wasDone
 state.listPhase='list'
 state.listActiveEx=null
 if(state.listInlineTimer?.key===key){ clearInterval(listRestInterval); listRestInterval=null; state.listInlineTimer=null }
 if(!wasDone&&!isStretchEx(ex)&&ex.rest>0) _listStartInlineTimer(ex,bi,ei,ex.rest,'Descansando',false)
 else render()
}
function listStartRest(bi,ei){
 const session=getSessions().find(s=>s.id===state.sessionId)
 const ex=session.blocks[bi].exercises[ei]
 state.listPhase='list'; state.listActiveEx=null
 _listStartInlineTimer(ex,bi,ei,ex.rest,'Descansando',false)
}
function listStartStretch(bi,ei){
 const session=getSessions().find(s=>s.id===state.sessionId)
 const ex=session.blocks[bi].exercises[ei]
 state.listPhase='list'; state.listActiveEx=null
 _listStartInlineTimer(ex,bi,ei,ex.duration,'Manteniendo',true)
}
function _listStartInlineTimer(ex,bi,ei,secs,label,autoMark){
 if(listRestInterval){ clearInterval(listRestInterval); listRestInterval=null }
 const key=`${ex.name}|${bi}|${ei}`
 state.listInlineTimer={key,left:secs,total:secs,label,autoMark,bi,ei}
 render()
 listRestInterval=setInterval(()=>{
  if(!state.listInlineTimer){ clearInterval(listRestInterval); listRestInterval=null; return }
  state.listInlineTimer.left--
  if(state.listInlineTimer.left<=0){
   clearInterval(listRestInterval); listRestInterval=null
   if(state.listInlineTimer.autoMark) state.listDone[state.listInlineTimer.key]=true
   state.listInlineTimer=null
   vibe([40,30,40])
  }
  render()
 },1000)
}
function listTimerSkip(){
 if(listRestInterval){ clearInterval(listRestInterval); listRestInterval=null }
 state.listInlineTimer=null
 render()
}
function listTimerToggle(){
 if(listRestInterval){ clearInterval(listRestInterval); listRestInterval=null; render() }
 else if(state.listInlineTimer){
  listRestInterval=setInterval(()=>{
   if(!state.listInlineTimer){ clearInterval(listRestInterval); listRestInterval=null; return }
   state.listInlineTimer.left--
   if(state.listInlineTimer.left<=0){
    clearInterval(listRestInterval); listRestInterval=null
    if(state.listInlineTimer.autoMark) state.listDone[state.listInlineTimer.key]=true
    state.listInlineTimer=null
    vibe([40,30,40])
   }
   render()
  },1000)
  render()
 }
}
function listFinish(){
 if(listRestInterval){ clearInterval(listRestInterval); listRestInterval=null }
 state.listInlineTimer=null
 state.screen='done'
 markDone(state.sessionId)
 vibe([100,50,100,50,300])
 render()
}

// ─── RENDER + EVENTS ───────────────────────────────────────────────────────────
function render(){
 const app=document.getElementById('app')
 if(state.screen==='home')        app.innerHTML=renderHome()
 else if(state.screen==='session') app.innerHTML=renderSession()
 else if(state.screen==='workout')      app.innerHTML=renderWorkout()
 else if(state.screen==='workout-list') app.innerHTML=renderWorkoutList()
 else if(state.screen==='edit')         app.innerHTML=renderEdit()
 else if(state.screen==='done')         app.innerHTML=renderDone()
 bindEvents()
}

function bindEvents(){
 document.querySelectorAll('[data-action]').forEach(el=>{
  const tag=el.tagName.toLowerCase()
  const evt=(tag==='input'||tag==='textarea')?'input':'click'
  el.addEventListener(evt, e=>{
   const a=el.dataset.action
   if(a==='close-weight-bg'&&e.target!==el) return
   if(a==='img-picker-close-bg'&&e.target!==el) return
   if(a==='cat')              setCat(el.dataset.cat)
   else if(a==='session'&&el.dataset.id) selectSession(el.dataset.id)
   else if(a==='session')     goSession()
   else if(a==='start')       startWorkout()
   else if(a==='start-list')  startWorkoutList()
   else if(a==='list-tap')          listTap(+el.dataset.bi,+el.dataset.ei)
   else if(a==='list-mark-done')    listMarkDone(+el.dataset.bi,+el.dataset.ei)
   else if(a==='list-start-rest')   listStartRest(+el.dataset.bi,+el.dataset.ei)
   else if(a==='list-start-stretch') listStartStretch(+el.dataset.bi,+el.dataset.ei)
   else if(a==='list-modal-close'||a==='list-modal-close-bg'){ if(a==='list-modal-close-bg'&&e.target!==el) return; state.listPhase='list'; state.listActiveEx=null; render() }
   else if(a==='list-timer-skip')   listTimerSkip()
   else if(a==='list-timer-toggle') listTimerToggle()
   else if(a==='list-finish')       listFinish()
   else if(a==='start-ex')    startExercise()
   else if(a==='toggle')      toggleRun()
   else if(a==='next')        goNext()
   else if(a==='prev')        goPrev()
   else if(a==='restart')     restart()
   else if(a==='home')        goHome()
   else if(a==='toggle-dark') toggleDark()
   else if(a==='coach')      toggleCoach()
   else if(a==='coach-close'||a==='coach-close-bg') { if(a==='coach-close-bg'&&e.target!==el) return; state.showCoach=false; render() }
   else if(a==='weight')      openWeightModal(el.dataset.name,el.dataset.bi,el.dataset.ei)
   else if(a==='wt-input')    state.wf.weight=el.value
   else if(a==='close-weight'||a==='close-weight-bg') closeWeightModal()
   else if(a==='save-wt')     saveWeightEntry()
   else if(a==='wt-u-kg')     { captureWtInput(); state.wf.unit='kg';  render() }
   else if(a==='wt-u-lbs')    { captureWtInput(); state.wf.unit='lbs'; render() }
   else if(a.startsWith('wt-t-')) { captureWtInput(); state.wf.tool=a.slice(5); render() }
   else if(a.startsWith('wt-r-')) { captureWtInput(); state.wf.rpe=a.slice(5);  render() }
   // edit
   else if(a==='edit-open')   openEdit(el.dataset.id)
   else if(a==='edit-back')   goEditBack()
   else if(a==='edit-save')   saveEdit()
   else if(a==='ex-expand')   editExpandEx(el.dataset.key)
   else if(a==='ex-up')       moveExUp(+el.dataset.bi,+el.dataset.ei)
   else if(a==='ex-down')     moveExDown(+el.dataset.bi,+el.dataset.ei)
   else if(a==='ex-dup')      duplicateEx(+el.dataset.bi,+el.dataset.ei)
   else if(a==='ex-del')      deleteEx(+el.dataset.bi,+el.dataset.ei)
   else if(a==='ex-add')      addEx(+el.dataset.bi)
   else if(a==='ex-field')    updateExField(+el.dataset.bi,+el.dataset.ei,el.dataset.field,el.value)
   else if(a==='ls-ex-field') updateSessionExField(+el.dataset.bi,+el.dataset.ei,el.dataset.field,el.value)
   else if(a==='img-picker')  openImagePicker(+el.dataset.bi,+el.dataset.ei)
   else if(a==='img-select')  selectImage(el.dataset.img)
   else if(a==='img-picker-close'||a==='img-picker-close-bg') closeImagePicker()
  })
 })
}

render()
startTimer()
</script>
</body>
</html>
